name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from pyproject.toml
        id: version
        run: |
          v=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Package version: $v"

      - name: "Guard tag matches pyproject version"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg="${{ steps.version.outputs.version }}"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match pyproject version $pkg"
            exit 1
          fi

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: release
      url: https://pypi.org/p/vadgr-computer-use
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  github-release:
    runs-on: ubuntu-latest
    needs: pypi
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and package the extension (load-unpacked zip)
        run: |
          cd extension
          npm ci
          npm run build
          ext_ver=$(node -p "require('./manifest.json').version")
          # Zip the dist/ contents flat at the zip root, so unzipping yields the
          # exact folder to "Load unpacked" in chrome://extensions.
          ( cd dist && zip -r -X "$GITHUB_WORKSPACE/vadgr-cua-extension-${ext_ver}.zip" . )
          echo "Packaged vadgr-cua-extension-${ext_ver}.zip:"
          unzip -l "$GITHUB_WORKSPACE/vadgr-cua-extension-${ext_ver}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            vadgr-cua-extension-*.zip
